# fly.toml — deploy: fly launch && fly deploy
# Docs: cloud/infra/deploy-fly.md

app = "plg-api"
primary_region = "ams"

[build]
  dockerfile = "cloud/Dockerfile"

[env]
  PLG_ENV = "production"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[http_service.checks]]
  grace_period = "20s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
