services:
  - type: web
    name: plg-api
    runtime: docker
    dockerfilePath: ./cloud/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PLG_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
    # Set secrets in Render dashboard (never commit):
    # SUPABASE_URL, SUPABASE_SERVICE_KEY, GEMINI_API_KEY, REDIS_URL, SENTRY_DSN
